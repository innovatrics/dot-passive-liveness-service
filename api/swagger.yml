openapi: 3.0.1
info:
  title: Passive Liveness Service
  version: 2.2.0
paths:
  /api/v1/health:
    get:
      tags:
      - Actuator
      operationId: getHealth
      responses:
        "200":
          description: getHealth 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthResult"
  /api/v1/health/{selector}:
    get:
      tags:
      - Actuator
      operationId: getHealth_1
      parameters:
      - name: selector
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/HealthCheckType"
      responses:
        "200":
          description: getHealth_1 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthResult"
  /api/v1/info:
    get:
      tags:
      - Actuator
      operationId: getInfo
      responses:
        "200":
          description: getInfo 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/v1/liveness/passive/evaluation:
    post:
      tags:
      - Liveness
      summary: Evaluate passive liveness
      operationId: evaluatePassiveLiveness
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassiveLivenessEvaluationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassiveLivenessEvaluationResponse"
        "400":
          description: |-
            Bad request

            Possible error codes:
             - INVALID_IMAGE
             - INVALID_REQUEST_BODY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: |-
            Internal Server Error

            Possible error codes:
             - UNEXPECTED_ERROR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - BearerAuthorization: []
components:
  schemas:
    Error:
      type: string
      enum:
      - NO_FACE_DETECTED
    ErrorCode:
      type: string
      enum:
      - NOT_FOUND
      - INTERNAL_SERVER_ERROR
      - UNAUTHORIZED
      - METHOD_NOT_ALLOWED
      - INVALID_IMAGE
      - BAD_REQUEST
    ErrorResponse:
      required:
      - errorCode
      - errorMessage
      type: object
      properties:
        errorCode:
          description: Error code
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/ErrorCode"
        errorMessage:
          type: string
          description: Error detailed description. It's only informative.
          readOnly: true
      description: Error response
      readOnly: true
    HealthCheckType:
      type: string
      enum:
      - LIVENESS
      - READINESS
    HealthResult:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/HealthStatus"
        details:
          type: object
    HealthStatus:
      required:
      - description
      - name
      - operational
      - severity
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        operational:
          type: boolean
          nullable: true
        severity:
          type: integer
          format: int32
          nullable: true
    PassiveLivenessEvaluationRequest:
      required:
      - selfie
      type: object
      properties:
        selfie:
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationRequest.SelfieDTO"
          - type: object
            writeOnly: true
      writeOnly: true
    PassiveLivenessEvaluationRequest.ImageDTO:
      required:
      - data
      type: object
      properties:
        data:
          type: string
          description: The data bytes as Base64 encoded string.
          writeOnly: true
      description: Image provided as Base64 encoded string.
      writeOnly: true
    PassiveLivenessEvaluationRequest.SelfieDTO:
      required:
      - image
      type: object
      properties:
        image:
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationRequest.ImageDTO"
          - type: object
            writeOnly: true
      writeOnly: true
    PassiveLivenessEvaluationResponse:
      required:
      - faces
      - score
      type: object
      properties:
        score:
          maximum: 1
          minimum: 0
          type: number
          description: "The passive liveness score computed for the detected face\
            \ identified by `evaluatedFaceId`. Values range from 0.0 to 1.0, where\
            \ values closer to 1.0 indicate a higher probability that the evaluated\
            \ face is live."
          format: float
          readOnly: true
          example: 0.8
        evaluatedFaceId:
          type: string
          description: Identifier of the detected face on which the liveness `score`
            was computed. This value corresponds to the `faceId` of one of the items
            in the `faces` list.
          nullable: true
          readOnly: true
        faces:
          type: array
          description: List of detected faces in the image.
          readOnly: true
          items:
            $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.DetectedFace"
        errors:
          type: object
          nullable: true
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.PassiveLivenessErrors"
          - type: object
        warnings:
          type: object
          nullable: true
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.PassiveLivenessWarnings"
          - type: object
      readOnly: true
    PassiveLivenessEvaluationResponse.DetectedFace:
      required:
      - detection
      - faceId
      type: object
      properties:
        faceId:
          type: string
          description: Unique identifier of the detected face.
          readOnly: true
        detection:
          description: Result of the face detection.
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.FaceDetection"
      description: Detected face information.
      readOnly: true
    PassiveLivenessEvaluationResponse.FaceCorners:
      required:
      - bottomLeft
      - bottomRight
      - topLeft
      - topRight
      type: object
      properties:
        topLeft:
          description: "Top left corner of the detected face, in relative coordinates"
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.Point"
        topRight:
          description: "Top right corner of the detected face, in relative coordinates"
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.Point"
        bottomRight:
          description: "Bottom right corner of the detected face, in relative coordinates"
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.Point"
        bottomLeft:
          description: "Bottom left corner of the detected face, in relative coordinates"
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.Point"
      readOnly: true
    PassiveLivenessEvaluationResponse.FaceDetection:
      required:
      - confidence 
      - corners
      type: object
      properties:
        confidence:
          maximum: 1
          minimum: 0
          type: number
          description: "The face detection confidence. Values range from 0.0 to 1.0,\
            \ where values closer to 1.0 indicate higher confidence that a human face\
            \ was detected."
          format: float
          readOnly: true
          example: 0.84
        corners:
          description: The normalized corner coordinates of the detected face region.
            Coordinates are relative to the image dimensions and range from 0.0 to
            1.0.
          readOnly: true
          allOf:
          - $ref: "#/components/schemas/PassiveLivenessEvaluationResponse.FaceCorners"
    PassiveLivenessEvaluationResponse.PassiveLivenessErrors:
      required:
      - selfie
      type: object
      properties:
        selfie:
          type: array
          description: The errors
          readOnly: true
          items:
            $ref: "#/components/schemas/Error"
      readOnly: true
    PassiveLivenessEvaluationResponse.PassiveLivenessWarnings:
      required:
      - selfie
      type: object
      properties:
        selfie:
          type: array
          description: The warnings
          readOnly: true
          items:
            $ref: "#/components/schemas/Warning"
      readOnly: true
    PassiveLivenessEvaluationResponse.Point:
      required:
      - x
      - "y"
      type: object
      properties:
        x:
          maximum: 1
          minimum: 0
          type: number
          description: "Normalized x-axis coordinate of the point, relative to the\
            \ image width"
          format: float
          readOnly: true
          example: 0.67
        "y":
          maximum: 1
          minimum: 0
          type: number
          description: "Normalized y-axis coordinate of the point, relative to the\
            \ image height"
          format: float
          readOnly: true
          example: 0.42
      description: The point coordinates.
      readOnly: true
    Warning:
      type: string
      enum:
      - MULTIPLE_FACES_DETECTED
      - LOW_QUALITY
  securitySchemes:
    BearerAuthorization:
      type: http
      scheme: bearer
